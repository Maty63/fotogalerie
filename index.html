<!doctype html>
<html lang="cs">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Responzivní fotogalerie</title>

    <link rel="stylesheet" href="./src/output.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.5/css/lightbox.min.css"
    />
  </head>

  <body class="bg-gradient-to-br from-slate-100 via-blue-50 to-slate-200 text-slate-800 min-h-screen">

    <main class="mx-auto max-w-7xl px-4 py-10 sm:px-6 lg:px-8">

      <h1 class="mb-4 rounded-xl bg-white px-5 py-3 text-3xl font-bold tracking-tight text-indigo-700 shadow-lg border border-slate-200">
        Školní fotogalerie
      </h1>

      <p class="mb-8 text-slate-600">
        Fotky školy
      </p>

      <section class="grid grid-cols-1 gap-5 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">

        <figure class="group overflow-hidden rounded-2xl bg-white/90 border border-slate-200 shadow-md transition duration-300 hover:-translate-y-1 hover:shadow-2xl hover:border-indigo-300">
          <a href="./skola-foto/nahled-skola08.jpg" data-lightbox="tailgallery" data-title="Náhodná fotka 1" class="block w-full cursor-zoom-in">
            <img src="./skola-foto/nahledy-skola01.jpg" alt="Náhodná fotka 1" class="h-64 w-full object-cover transition duration-500 group-hover:scale-105" loading="lazy" />
          </a>
        </figure>

        <figure class="group overflow-hidden rounded-2xl bg-white/90 border border-slate-200 shadow-md transition duration-300 hover:-translate-y-1 hover:shadow-2xl hover:border-indigo-300">
          <a href="./skola-foto/nahled-skola07.jpg" data-lightbox="tailgallery" data-title="Náhodná fotka 2" class="block w-full cursor-zoom-in">
            <img src="./skola-foto/nahledy-skola08.jpg" alt="Náhodná fotka 2" class="h-64 w-full object-cover transition duration-500 group-hover:scale-105" loading="lazy" />
          </a>
        </figure>

        <figure class="group overflow-hidden rounded-2xl bg-white/90 border border-slate-200 shadow-md transition duration-300 hover:-translate-y-1 hover:shadow-2xl hover:border-indigo-300">
          <a href="./skola-foto/nahled-skola06.jpg" data-lightbox="tailgallery" data-title="Náhodná fotka 3" class="block w-full cursor-zoom-in">
            <img src="./skola-foto/nahledy-skola07.jpg" alt="Náhodná fotka 3" class="h-64 w-full object-cover transition duration-500 group-hover:scale-105" loading="lazy" />
          </a>
        </figure>

        <figure class="group overflow-hidden rounded-2xl bg-white/90 border border-slate-200 shadow-md transition duration-300 hover:-translate-y-1 hover:shadow-2xl hover:border-indigo-300">
          <a href="./skola-foto/nahled-skola05.jpg" data-lightbox="tailgallery" data-title="Náhodná fotka 4" class="block w-full cursor-zoom-in">
            <img src="./skola-foto/nahledy-skola06.jpg" alt="Náhodná fotka 4" class="h-64 w-full object-cover transition duration-500 group-hover:scale-105" loading="lazy" />
          </a>
        </figure>

        <figure class="group overflow-hidden rounded-2xl bg-white/90 border border-slate-200 shadow-md transition duration-300 hover:-translate-y-1 hover:shadow-2xl hover:border-indigo-300">
          <a href="./skola-foto/nahled-skola04.jpg" data-lightbox="tailgallery" data-title="Náhodná fotka 5" class="block w-full cursor-zoom-in">
            <img src="./skola-foto/nahledy-skola05.jpg" alt="Náhodná fotka 5" class="h-64 w-full object-cover transition duration-500 group-hover:scale-105" loading="lazy" />
          </a>
        </figure>

        <figure class="group overflow-hidden rounded-2xl bg-white/90 border border-slate-200 shadow-md transition duration-300 hover:-translate-y-1 hover:shadow-2xl hover:border-indigo-300">
          <a href="./skola-foto/nahled-skola03.jpg" data-lightbox="tailgallery" data-title="Náhodná fotka 6" class="block w-full cursor-zoom-in">
            <img src="./skola-foto/nahledy-skola04.jpg" alt="Náhodná fotka 6" class="h-64 w-full object-cover transition duration-500 group-hover:scale-105" loading="lazy" />
          </a>
        </figure>

        <figure class="group overflow-hidden rounded-2xl bg-white/90 border border-slate-200 shadow-md transition duration-300 hover:-translate-y-1 hover:shadow-2xl hover:border-indigo-300">
          <a href="./skola-foto/nahled-skola02.jpg" data-lightbox="tailgallery" data-title="Náhodná fotka 7" class="block w-full cursor-zoom-in">
            <img src="./skola-foto/nahledy-skola03.jpg" alt="Náhodná fotka 7" class="h-64 w-full object-cover transition duration-500 group-hover:scale-105" loading="lazy" />
          </a>
        </figure>

        <figure class="group overflow-hidden rounded-2xl bg-white/90 border border-slate-200 shadow-md transition duration-300 hover:-translate-y-1 hover:shadow-2xl hover:border-indigo-300">
          <a href="./skola-foto/nahled-skola01.jpg" data-lightbox="tailgallery" data-title="Náhodná fotka 8" class="block w-full cursor-zoom-in">
            <img src="./skola-foto/nahledy-skola02.jpg" alt="Náhodná fotka 8" class="h-64 w-full object-cover transition duration-500 group-hover:scale-105" loading="lazy" />
          </a>
        </figure>

      </section>
    </main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lightbox2/2.11.5/js/lightbox.min.js"></script>

    <script>
      lightbox.option({
        albumLabel: "Obrázek %1 z %2",
        wrapAround: true,
        disableScrolling: true,
        fadeDuration: 200,
        imageFadeDuration: 200,
        resizeDuration: 200,
      });
    </script>

  </body>
</html>
